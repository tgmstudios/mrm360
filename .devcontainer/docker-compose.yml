services:
  workspace:
    image: mcr.microsoft.com/devcontainers/typescript-node:22-bookworm
    command: sleep infinity
    volumes:
      - ..:/workspace:cached
      - node_modules:/workspace/node_modules
    networks:
      - app-network
    ports:
      - "3010:3010"
      - "3011:3011"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://mrm360:mrm360@postgres:5432/mrm360?schema=public
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NEXTAUTH_URL=http://localhost:3011
      - FRONTEND_URL=http://localhost:3010
      - AUTHENTIK_REDIRECT_URI=http://localhost:3010/auth/callback
    env_file:
      - path: ../backend/.env
        required: false

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - app-network
    environment:
      POSTGRES_USER: mrm360
      POSTGRES_PASSWORD: mrm360
      POSTGRES_DB: mrm360
    ports:
      - "3012:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mrm360 -d mrm360"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "3013:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "3014:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  node_modules:

networks:
  app-network:
